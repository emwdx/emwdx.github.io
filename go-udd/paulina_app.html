<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Prácticas UDD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .report-card { box-shadow: none; border: 1px solid #e2e8f0; width: 100%; margin: 0; page-break-after: always; }
        }
        .score-bar { height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; }
        .score-fill { height: 100%; background: #1e40af; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- DASHBOARD INICIAL -->
    <div class="max-w-5xl mx-auto no-print mb-8">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Portal de Evaluación de Prácticas</h1>
            <p class="text-slate-500 mb-6">Sube el CSV para procesar los informes automáticamente.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">1. Cargar archivo CSV:</label>
                    <input type="file" id="csvFile" accept=".csv" 
                        class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-slate-200 rounded-lg p-2"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">2. Buscar Estudiante:</label>
                    <input type="text" id="searchInput" placeholder="Escribe un nombre..." 
                        class="w-full p-2.5 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
        </div>

        <div id="studentList" class="mt-6 flex gap-2 flex-wrap max-h-40 overflow-y-auto p-2"></div>
    </div>

    <!-- CONTENEDOR DEL REPORTE -->
    <div id="reportWrapper" class="max-w-5xl mx-auto">
        <div id="emptyState" class="text-center py-20 bg-white rounded-2xl border-2 border-dashed border-slate-200 text-slate-400">
            <p>Esperando archivo CSV...</p>
        </div>
    </div>

    <script>
        let allData = [];
        let headers = [];

        // Función para encontrar una columna por palabra clave
        function findCol(keyword) {
            return headers.find(h => h.toLowerCase().includes(keyword.toLowerCase())) || "";
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data;
                    headers = results.meta.fields;
                    renderList(allData);
                    if(allData.length > 0) renderReport(0);
                }
            });
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(s => {
                const nameCol = findCol("estudiante en práctica");
                return s[nameCol]?.toLowerCase().includes(term);
            });
            renderList(filtered);
        });

        function renderList(data) {
            const list = document.getElementById('studentList');
            list.innerHTML = '';
            const nameCol = findCol("estudiante en práctica");
            
            data.forEach((item) => {
                const btn = document.createElement('button');
                btn.className = "px-3 py-1 bg-white border border-slate-300 rounded-full text-xs hover:bg-blue-600 hover:text-white transition-colors truncate max-w-[180px]";
                btn.textContent = item[nameCol] || "Sin nombre";
                btn.onclick = () => renderReport(allData.indexOf(item));
                list.appendChild(btn);
            });
        }

        function getScoreClass(val) {
            if (!val) return "bg-slate-100 text-slate-400 border-slate-200";
            const v = val.toLowerCase();
            if (v.includes("sobresaliente")) return "bg-green-100 text-green-700 border-green-200";
            if (v.includes("bueno")) return "bg-blue-100 text-blue-700 border-blue-200";
            if (v.includes("suficiente")) return "bg-yellow-100 text-yellow-700 border-yellow-200";
            if (v.includes("insuficiente")) return "bg-red-100 text-red-700 border-red-200";
            return "bg-slate-100 text-slate-700 border-slate-200";
        }

        function renderReport(index) {
            const s = allData[index];
            if (!s) return;

            const wrapper = document.getElementById('reportWrapper');

            // Mapeo Inteligente de Columnas
            const colNombre = findCol("estudiante en práctica");
            const colEmpresa = findCol("Nombre de Empresa");
            const colArea = findCol("área de desempeño");
            const colTutor = findCol("profesional a cargo");
            const colCargoTutor = findCol("Cargo del profesional");
            const colEvalGral = findCol("Evaluación general");
            const colFeedback = findCol("comentarios adicionales");
            const colFortalezas = findCol("fortalezas y debilidades");
            const colHabilidades = findCol("habilidades específicas");
            const colTecnico = findCol("conocimientos técnicos");
            const colRecomendacion = findCol("recomendación específica");

            // Mapeo de Skills (basado en palabras clave típicas)
            const skills = [
                { n: "Puntualidad", v: s[findCol("PUNTUALIDAD")] },
                { n: "Orden", v: s[findCol("ORDEN")] },
                { n: "Disciplina", v: s[findCol("DISCIPLINA")] },
                { n: "Autonomía", v: s[findCol("AUTONOMÍA")] },
                { n: "Actitud Positiva", v: s[findCol("ACTITUD POSITIVA")] },
                { n: "Pensamiento Creativo", v: s[findCol("PENSAMIENTO CREATIVO")] },
                { n: "Trabajo en Equipo", v: s[findCol("TRABAJO EN EQUIPO")] },
                { n: "Pensamiento Estratégico", v: s[findCol("PENSAMIENTO ESTRATÉGICO")] },
                { n: "Resolución Problemas", v: s[findCol("RESOLUCIÓN DE PROBEMAS")] },
                { n: "Innovación", v: s[findCol("INNOVACIÓN")] },
                { n: "Proactividad", v: s[findCol("PROACTIVIDAD")] },
                { n: "Manejo Software", v: s[findCol("MANEJO DE SOFTWARES")] }
            ];

            const skillsHtml = skills.map(skill => {
                const score = parseInt(skill.v) || 0;
                const pct = (score / 5) * 100;
                return `
                    <div class="mb-3">
                        <div class="flex justify-between text-[10px] font-bold uppercase text-slate-400 mb-1">
                            <span>${skill.n}</span>
                            <span>${score > 0 ? score + '/5' : 'N/A'}</span>
                        </div>
                        <div class="score-bar"><div class="score-fill" style="width: ${pct}%"></div></div>
                    </div>
                `;
            }).join('');

            wrapper.innerHTML = `
                <div class="report-card bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                    <div class="bg-slate-900 p-8 text-white flex justify-between items-start">
                        <div>
                            <div class="text-blue-400 font-bold text-xs tracking-widest uppercase mb-2">Informe de Práctica</div>
                            <h2 class="text-3xl font-black mb-1">${s[colNombre] || 'Nombre no encontrado'}</h2>
                            <p class="text-slate-400 font-medium">${s[colEmpresa] || 'Empresa no encontrada'} • ${s[colArea] || 'Área no encontrada'}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">Desempeño General</div>
                            <div class="px-3 py-1 rounded-lg border font-bold ${getScoreClass(s[colEvalGral])}">
                                ${s[colEvalGral] || 'S/I'}
                            </div>
                        </div>
                    </div>

                    <div class="p-8 grid grid-cols-1 md:grid-cols-12 gap-10">
                        <div class="md:col-span-4 bg-slate-50 p-6 rounded-xl border border-slate-100">
                            <h3 class="text-slate-800 font-bold mb-6 text-sm uppercase tracking-wider">Evaluación Cuantitativa</h3>
                            ${skillsHtml}
                            <div class="mt-8 pt-6 border-t border-slate-200">
                                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Supervisor</p>
                                <p class="text-sm font-bold text-slate-700">${s[colTutor] || 'No indicado'}</p>
                                <p class="text-xs text-slate-500">${s[colCargoTutor] || ''}</p>
                            </div>
                        </div>

                        <div class="md:col-span-8 space-y-6">
                            <section>
                                <h4 class="text-xs font-bold text-slate-400 uppercase mb-3">Comentarios del Empleador</h4>
                                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg shadow-sm">
                                    <p class="text-slate-700 italic text-sm leading-relaxed">"${s[colFeedback] || 'Sin comentarios adicionales.'}"</p>
                                </div>
                            </section>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="p-4 rounded-xl border border-slate-100 bg-slate-50">
                                    <h5 class="font-bold text-slate-800 text-xs uppercase mb-2">Fortalezas/Debilidades Perfil</h5>
                                    <p class="text-xs text-slate-600 leading-relaxed">${s[colFortalezas] || 'No disponible'}</p>
                                </div>
                                <div class="p-4 rounded-xl border border-slate-100 bg-slate-50">
                                    <h5 class="font-bold text-slate-800 text-xs uppercase mb-2">Habilidades Recomendadas</h5>
                                    <p class="text-xs text-slate-600 leading-relaxed">${s[colHabilidades] || 'No disponible'}</p>
                                </div>
                            </div>

                            <section class="bg-slate-800 text-white p-6 rounded-xl">
                                <h5 class="text-blue-400 font-bold text-[10px] uppercase mb-4">Análisis Técnico y Sugerencias</h5>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-xs">
                                    <div>
                                        <p class="text-slate-400 font-bold mb-1 uppercase">Conocimientos Técnicos:</p>
                                        <p>${s[colTecnico] || 'S/I'}</p>
                                    </div>
                                    <div>
                                        <p class="text-slate-400 font-bold mb-1 uppercase">Recomendación UDD:</p>
                                        <p>${s[colRecomendacion] || 'S/I'}</p>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-4 text-center border-t border-slate-100 no-print">
                        <button onclick="window.print()" class="bg-blue-600 text-white px-8 py-2 rounded-full font-bold shadow-lg hover:bg-blue-700">Imprimir Informe</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
