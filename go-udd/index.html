<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=https://docs.google.com/document/d/1Ug_decaIkeXixVtC-DBgQWR2phrn6pQFgVXiRH-m5CE/edit?tab=t.pt8z7xd6cq6i#heading=h.pn4cpyn3u4qj">

<style>
        /* This CSS makes the background image fill the screen */
        body {
            /* Remove default browser margins */
            margin: 0;
            padding: 0;
            
            /* Make the body take up 100% of the viewport height */
            height: 100vh;
            
            /* Set the background image */
            background-image: url('udd-redirect.jpeg');
            
            /* Ensure the image covers the entire screen without stretching */
            background-size: cover;
            
            /* Center the image */
            background-position: center;
            
            /* Prevent the image from tiling */
            background-repeat: no-repeat;
            
            /* Optional: Make the fallback text look a bit nicer over an image */
            font-family: sans-serif;
            color: white; 
            text-align: center;
            /* Adds a dark shadow so text is readable on light or dark images */
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8); 
            
            /* Centers the text vertically and horizontally */
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <p>If you are not redirected automatically, follow this <a href="https://docs.google.com/document/d/1Ug_decaIkeXixVtC-DBgQWR2phrn6pQFgVXiRH-m5CE/edit?tab=t.pt8z7xd6cq6i#heading=h.pn4cpyn3u4qj">link</a>.</p>
</body>
</html>
