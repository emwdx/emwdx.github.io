<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@500;600&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#12293B;
    --navy-2:#1B3C52;
    --teal:#2F7C82;
    --sand:#F3ECDB;
    --sand-deep:#E8DEC4;
    --card:#FFFDF8;
    --ink:#1D2B32;
    --ink-soft:#5B6C74;
    --coral:#E4572E;
    --line:#D7CDAF;
    --line-soft:#ECE3C8;
    --rope:#B7A97C;
    --shadow:0 1px 2px rgba(18,41,59,.08), 0 4px 10px rgba(18,41,59,.06);
    --pxmin: 1.4; /* pixels per minute of the timeline */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--sand);
    color:var(--ink);
    font-family:'Work Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
  }

  /* ---------- Header ---------- */
  header.board{
    background:
      radial-gradient(1200px 300px at 20% -40%, rgba(255,255,255,.06), transparent 60%),
      linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    color:#F4EFE0;
    padding:34px 24px 22px;
    position:relative; overflow:hidden;
    border-bottom:6px solid var(--rope);
  }
  header.board::before{
    content:""; position:absolute; inset:0;
    background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 2px, transparent 2px 46px);
    pointer-events:none;
  }
  .board-inner{max-width:1300px;margin:0 auto;position:relative;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.16em;
    text-transform:uppercase; color:#C9DCD9; display:flex; align-items:center; gap:8px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--coral);display:inline-block;}
  h1{
    font-family:'Archivo Black',sans-serif; font-weight:400;
    font-size:clamp(34px,6vw,58px); letter-spacing:.01em; margin:6px 0 4px;
    text-shadow:0 1px 0 rgba(255,255,255,.08), 0 3px 10px rgba(0,0,0,.35);
  }
  .subtitle{font-size:15px; color:#CBD9D5; margin:0 0 18px;}
  .route{position:relative; height:26px; margin-top:6px;}
  .route svg{width:100%;height:100%;display:block;}

  /* ---------- Toolbar / legend ---------- */
  .toolbar{
    max-width:1300px; margin:0 auto; display:flex; flex-wrap:wrap; gap:10px;
    align-items:center; padding:14px 24px;
  }
  .toolbar .hint{font-size:13px; color:var(--ink-soft); margin-right:auto; max-width:600px; line-height:1.45;}
  .toolbar .hint b{color:var(--ink);}

  .legend{
    max-width:1300px; margin:0 auto; padding:0 24px 6px;
    display:flex; gap:18px; flex-wrap:wrap; font-size:12.5px; color:var(--ink-soft);
  }
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .swatch.travel{background:#6E8AA6;}
  .swatch.activity{background:var(--teal);}
  .swatch.meal{background:#C98A3B;}
  .swatch.match{background:#2E8B47;}
  .swatch.work{background:repeating-linear-gradient(135deg, #C9BEA0 0 6px, #DCD3B8 6px 12px);}

  /* ---------- Board ---------- */
  .board-wrap{max-width:1300px; margin:0 auto 60px; padding:0 24px;}
  .grid-scroll{
    overflow-x:auto; overflow-y:hidden;
    border:1px solid var(--line); border-radius:10px;
    background:var(--card); box-shadow:var(--shadow);
    scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch;
  }
  .board-grid{
    display:grid;
    grid-template-columns: 66px repeat(8, minmax(148px,1fr));
    grid-template-rows: 26px 62px auto;
    min-width:1260px;
  }
  .brk{background:var(--sand-deep); border-bottom:1px solid var(--line); grid-row:1;}
  .dayhead{
    grid-row:2; position:sticky; top:0; z-index:5;
    background:var(--navy); color:#F4EFE0; padding:10px 8px 9px; text-align:center;
    border-left:1px solid rgba(255,255,255,.08);
    scroll-snap-align:start;
  }
  .dayhead.gap-after{border-right:3px dashed var(--rope);}
  .dayhead .dow{font-family:'Archivo Black',sans-serif; font-weight:400; font-size:14px; letter-spacing:.02em;}
  .dayhead .md{font-family:'IBM Plex Mono',monospace; font-size:11px; color:#B9CFCB; margin-top:2px;}
  .dayhead .wx{
    margin-top:4px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#DCEAE7;
    display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .dayhead .wx .wx-ico{font-size:13px; line-height:1;}

  .timegutter{
    grid-row:3; grid-column:1; position:sticky; left:0; z-index:4;
    background:var(--sand-deep); border-right:1px solid var(--line);
  }
  .corner{grid-row:1/3; grid-column:1; position:sticky; left:0; top:0; z-index:6; background:var(--navy);}

  .timelabel{
    position:absolute; right:8px; transform:translateY(-50%);
    font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); font-size:10.5px; white-space:nowrap;
  }
  .timelabel.hour{color:var(--navy); font-weight:600; font-size:11.5px;}

  .daycol{
    grid-row:3; position:relative; border-left:1px dashed var(--line-soft);
    background-repeat:repeat-y;
  }
  .daycol.gap-after{border-right:3px dashed var(--rope);}

  .workband{
    position:absolute; left:0; right:0;
    background:repeating-linear-gradient(135deg, #C9BEA0 0 7px, #DCD3B8 7px 14px);
    border-top:1px solid var(--rope); border-bottom:1px solid var(--rope);
    display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:0;
  }
  .workband .lbl{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
    color:#5B5330; white-space:nowrap;
  }

  .card{
    position:absolute; left:4px; right:4px; z-index:1;
    background:var(--card); border:1px solid var(--line); border-left:4px solid var(--teal);
    border-radius:8px; padding:5px 8px 6px; font-size:12.5px; line-height:1.3;
    box-shadow:0 1px 2px rgba(18,41,59,.06); cursor:pointer; user-select:none;
    overflow:hidden;
  }
  .card.has-link:hover{box-shadow:var(--shadow); border-color:var(--teal);}
  .card.travel{border-left-color:#6E8AA6;}
  .card.meal{border-left-color:#C98A3B;}
  .card.match{border-left-color:#2E8B47; background:linear-gradient(180deg,#FFFDF8,#F3FBF4);}
  .card .row1{display:flex; align-items:flex-start; gap:5px;}
  .card .ico{font-size:12.5px; line-height:1.3;}
  .card .title{font-weight:600; color:var(--ink);}
  .card.has-link .title{color:var(--navy); border-bottom:1px dotted var(--teal);}
  .card .ext{font-size:10px; opacity:.6; margin-left:2px;}
  .card .timespan{margin-top:2px; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-soft);}
  .card .cost{margin-top:1px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft);}

  footer{max-width:1300px; margin:0 auto 50px; padding:0 24px; font-size:12px; color:var(--ink-soft); line-height:1.6;}
  footer a{color:var(--navy);}
  footer code{background:var(--sand-deep); padding:1px 5px; border-radius:4px; font-size:11px;}

  @media (max-width:640px){
    header.board{padding:26px 16px 18px;}
    .toolbar,.legend,.board-wrap,footer{padding-left:14px; padding-right:14px;}
    .grid-scroll{scroll-snap-type:x mandatory;}
    .board-grid{min-width:0;}
    .dayhead .dow{font-size:12.5px;}
    .dayhead .md{font-size:10px;}
    .dayhead .wx{font-size:9.5px;}
    .dayhead .wx .wx-ico{font-size:11px;}
    .card{font-size:11px; padding:4px 6px 5px;}
    .card .timespan,.card .cost{font-size:9.5px;}
  }
</style>
</head>

document.getElementById('title').textContent = DATA.title;

const PXMIN = 1.4;

function toMin(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  return h*60 + m;
}
function fmtTime(min){
  let h=Math.floor(min/60), mm=Math.round(min%60);
  const ap = h>=12 ? 'PM':'AM';
  let h12 = h%12; if(h12===0) h12=12;
  return h12 + (mm ? ':'+String(mm).padStart(2,'0') : '') + ' ' + ap;
}

function globalStart(){ return toMin(DATA.startTime); }
function globalEnd(){ return toMin(DATA.endTime); }

// ---------- Weather (Open-Meteo, Port Clinton, OH) ----------
const WX_LAT = 41.5129, WX_LON = -82.9377;
const MONTHS = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
let WEATHER = {}; // 'YYYY-MM-DD' -> {code, hi, lo}

function isoForDay(d){
  const [mon, day] = d.md.split(' ');
  const m = String(MONTHS[mon]).padStart(2,'0');
  return `${DATA.year}-${m}-${String(day).padStart(2,'0')}`;
}

function wxIcon(code){
  if(code===0) return '☀️';
  if(code===1) return '🌤️';
  if(code===2) return '⛅';
  if(code===3) return '☁️';
  if(code===45||code===48) return '🌫️';
  if([51,53,55,56,57].includes(code)) return '🌦️';
  if([61,63,65,66,67,80,81,82].includes(code)) return '🌧️';
  if([71,73,75,77,85,86].includes(code)) return '❄️';
  if([95,96,99].includes(code)) return '⛈️';
  return '🌡️';
}

async function fetchWeather(){
  const isoDates = DATA.days.map(isoForDay);
  const start = isoDates[0], end = isoDates[isoDates.length-1];
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${WX_LAT}&longitude=${WX_LON}` +
    `&daily=weathercode,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit` +
    `&timezone=America%2FNew_York&start_date=${start}&end_date=${end}`;
  try{
    const res = await fetch(url);
    if(!res.ok) return;
    const json = await res.json();
    if(!json.daily || !json.daily.time) return;
    json.daily.time.forEach((iso,i)=>{
      WEATHER[iso] = {
        code: json.daily.weathercode[i],
        hi: Math.round(json.daily.temperature_2m_max[i]),
        lo: Math.round(json.daily.temperature_2m_min[i])
      };
    });
    render();
  }catch(err){
    // no forecast available (e.g. trip too far out) — leave days without a badge
  }
}

function iconFor(a){
  const t=(a.title||'').toLowerCase();
  if(a.type==='match') return '⚽';
  if(t.includes('flight')) return '✈️';
  if(t.includes('ferry')) return '⛴️';
  if(t.includes('drive')) return '🚗';
  if(a.type==='meal') return '🍽️';
  if(a.type==='activity') return '📍';
  return '•';
}

function costLine(cost){
  if(!cost) return '';
  const m = cost.match(/^\$([\d.\-]+)\/\$([\d.\-]+)$/);
  if(m) return `Adult $${m[1]} · Kid $${m[2]}`;
  return cost.replace(/^\$/, 'Cost: $');
}

function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const gStart = globalStart(), gEnd = globalEnd();
  const totalH = (gEnd - gStart) * PXMIN;

  grid.style.gridTemplateColumns = `66px repeat(${DATA.days.length}, minmax(148px,1fr))`;

  // corner (sticky top-left, spans caption+header rows)
  const corner = document.createElement('div');
  corner.className = 'corner';
  grid.appendChild(corner);

  // row 1: caption strip
  DATA.days.forEach((d,i)=>{
    const cap = document.createElement('div');
    cap.className='brk' + (d.gapAfter ? ' gap-after' : '');
    cap.style.gridColumn = `${2+i}`;
    grid.appendChild(cap);
  });

  // row 2: day headers
  DATA.days.forEach((d,i)=>{
    const h = document.createElement('div');
    h.className='dayhead' + (d.gapAfter ? ' gap-after' : '');
    h.style.gridColumn = `${2+i}`;
    const wx = WEATHER[isoForDay(d)];
    const wxHtml = wx ? `<div class="wx"><span class="wx-ico">${wxIcon(wx.code)}</span>${wx.hi}°/${wx.lo}°</div>` : '';
    h.innerHTML = `<div class="dow">${d.dow}</div><div class="md">${d.md}</div>${wxHtml}`;
    grid.appendChild(h);
  });

  // row 3: time gutter
  const gutter = document.createElement('div');
  gutter.className = 'timegutter';
  gutter.style.height = totalH + 'px';
  for(let m=gStart; m<=gEnd; m+=30){
    const lbl = document.createElement('div');
    const isHour = m%60===0;
    lbl.className = 'timelabel' + (isHour ? ' hour' : '');
    lbl.style.top = ((m-gStart)*PXMIN) + 'px';
    lbl.textContent = isHour ? fmtTime(m).replace(':00','') : fmtTime(m);
    gutter.appendChild(lbl);
  }
  grid.appendChild(gutter);

  // row 3: day columns
  const hourPx = 60*PXMIN, halfPx = 30*PXMIN;
  DATA.days.forEach((d,ci)=>{
    const col = document.createElement('div');
    col.className = 'daycol' + (d.gapAfter ? ' gap-after' : '');
    col.style.gridColumn = `${2+ci}`;
    col.style.height = totalH + 'px';
    col.style.backgroundImage =
      `repeating-linear-gradient(to bottom, var(--line) 0 1px, transparent 1px ${hourPx}px),` +
      `repeating-linear-gradient(to bottom, var(--line-soft) 0 1px, transparent 1px ${halfPx}px)`;
    col.style.backgroundPosition = `0 0, 0 ${halfPx}px`;
    col.dataset.day = d.id;

    if(d.work){
      const ws = toMin(d.work.start), we = toMin(d.work.end);
      const band = document.createElement('div');
      band.className = 'workband';
      band.style.top = ((ws-gStart)*PXMIN) + 'px';
      band.style.height = ((we-ws)*PXMIN) + 'px';
      band.innerHTML = `<span class="lbl">WORK · ${fmtTime(ws)}–${fmtTime(we)}</span>`;
      col.appendChild(band);
    }

    grid.appendChild(col);
  });

  // cards
  DATA.activities.forEach(a=>{
    const col = grid.querySelector(`.daycol[data-day="${a.day}"]`);
    if(!col) return;
    const s = toMin(a.start), e = toMin(a.end || a.start);
    const dur = Math.max(e-s, 15);
    const card = document.createElement('div');
    card.className = 'card ' + a.type + (a.url ? ' has-link' : '');
    card.dataset.id = a.id;
    card.style.top = ((s-gStart)*PXMIN) + 'px';
    card.style.height = (dur*PXMIN) + 'px';
    const cl = costLine(a.cost);
    card.innerHTML = `<div class="row1"><span class="ico">${iconFor(a)}</span><span class="title">${a.title}</span>${a.url?'<span class="ext">↗</span>':''}</div>
      <div class="timespan">${fmtTime(s)} – ${fmtTime(e)}</div>
      ${cl?`<div class="cost">${cl}</div>`:''}`;
    if(a.url){
      card.addEventListener('click', ()=> window.open(a.url, '_blank', 'noopener'));
    }
    col.appendChild(card);
  });
}

render();
fetchWeather();
</script>
</body>
</html>
