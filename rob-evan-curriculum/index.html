function parseFrontmatter(raw) {
  var lines = raw.split('\n');
  if (lines[0] !== '---') return { meta: {}, body: raw };
  var end = -1;
  for (var i = 1; i < lines.length; i++) {
    if (lines[i] === '---') { end = i; break; }
  }
  if (end === -1) return { meta: {}, body: raw };
  var meta = {};
  for (var j = 1; j < end; j++) {
    var line = lines[j];
    var idx = line.indexOf(':');
    if (idx === -1) continue;
    var key = line.slice(0, idx).trim();
    var val = line.slice(idx + 1).trim();
    if (val.charAt(0) === '[' && val.charAt(val.length - 1) === ']') {
      val = val.slice(1, -1).split(',').map(function(s){return s.trim();}).filter(Boolean);
    } else if ((val.charAt(0) === '"' && val.charAt(val.length-1) === '"') || (val.charAt(0) === "'" && val.charAt(val.length-1) === "'")) {
      val = val.slice(1, -1);
    }
    meta[key] = val;
  }
  var body = lines.slice(end + 1).join('\n');
  return { meta: meta, body: body };
}

function firstH1(body) {
  var m = body.match(/^#\s+(.+)$/m);
  return m ? m[1].trim() : null;
}

function humanize(slug) {
  var smallWords = {a:1,an:1,and:1,the:1,for:1,with:1,of:1,in:1,on:1,to:1,vs:1};
  var upper = {ai:1,ux:1,mvp:1,moc:1};
  return slug.split(/[-_]/).map(function(w, i){
    var lw = w.toLowerCase();
    if (upper[lw]) return lw.toUpperCase();
    if (i > 0 && smallWords[lw]) return lw;
    return lw ? lw.charAt(0).toUpperCase() + lw.slice(1) : lw;
  }).join(' ');
}

function getTitle(filePath, meta, body) {
  if (meta.title) return meta.title;
  var h1 = firstH1(body);
  if (h1) return h1;
  if (meta.name) return humanize(meta.name);
  var base = filePath.split('/').pop().replace(/\.md$/, '');
  return humanize(base);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function inline(text, resolveWikilink) {
  var s = escapeHtml(text);

  var codeStore = [];
  s = s.replace(/`([^`]+)`/g, function(m, code){
    codeStore.push(code);
    return ' CODE' + (codeStore.length - 1) + ' ';
  });

  s = s.replace(/\[\[([^\]|]+)(\|([^\]]+))?\]\]/g, function(m, slug, _p, label){
    var cleanSlug = slug.trim();
    var displayLabel = (label || cleanSlug).trim();
    var hit = resolveWikilink ? resolveWikilink(cleanSlug) : null;
    if (hit) {
      return '<a href="#' + encodeURIComponent(hit.path) + '" class="wikilink" data-path="' + hit.path + '">' + escapeHtml(displayLabel) + '</a>';
    }
    return '<span class="wikilink broken" title="No matching note">' + escapeHtml(displayLabel) + '</span>';
  });

  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, function(m, label, url){
    if (/^https?:\/\//i.test(url)) {
      return '<a href="' + url + '" target="_blank" rel="noopener">' + label + '</a>';
    }
    return '<span class="wikilink broken" title="' + escapeHtml(url) + '">' + label + '</span>';
  });

  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  s = s.replace(/(^|[^\w])_([^_\n]+)_(?!\w)/g, '$1<em>$2</em>');

  s = s.replace(/ CODE(\d+) /g, function(m, i){ return '<code>' + escapeHtml(codeStore[Number(i)]) + '</code>'; });

  return s;
}

function parseListItems(rawLines) {
  var items = [];
  for (var k = 0; k < rawLines.length; k++) {
    var line = rawLines[k];
    var m = line.match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
    if (!m) continue;
    var indent = m[1].replace(/\t/g, '    ').length;
    var ordered = /\d+\./.test(m[2]);
    var text = m[3];
    var checked = null;
    var cb = text.match(/^\[( |x|X)\]\s+(.*)$/);
    if (cb) { checked = cb[1].toLowerCase() === 'x'; text = cb[2]; }
    items.push({ indent: indent, ordered: ordered, checked: checked, text: text });
  }
  return items;
}

function buildList(items, start, minIndent, resolveWikilink) {
  var ordered = items[start].ordered;
  var tag = ordered ? 'ol' : 'ul';
  var html = '<' + tag + '>';
  var i = start;
  while (i < items.length && items[i].indent >= minIndent) {
    if (items[i].indent > minIndent) break;
    var it = items[i];
    var itemHtml = inline(it.text, resolveWikilink);
    var checkboxHtml = it.checked === null ? '' : ('<input type="checkbox" disabled ' + (it.checked ? 'checked' : '') + '> ');
    i++;
    if (i < items.length && items[i].indent > minIndent) {
      var nested = buildList(items, i, items[i].indent, resolveWikilink);
      itemHtml += nested[0];
      i = nested[1];
    }
    html += '<li>' + checkboxHtml + itemHtml + '</li>';
  }
  html += '</' + tag + '>';
  return [html, i];
}

function renderList(rawLines, resolveWikilink) {
  var items = parseListItems(rawLines);
  if (!items.length) return '';
  var result = buildList(items, 0, items[0].indent, resolveWikilink);
  return result[0];
}

function isTableSep(line) {
  return /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)*\|?\s*$/.test(line) && line.indexOf('-') !== -1;
}

function splitRow(line) {
  var s = line.trim();
  if (s.charAt(0) === '|') s = s.slice(1);
  if (s.charAt(s.length - 1) === '|') s = s.slice(0, -1);
  return s.split('|').map(function(c){return c.trim();});
}

function renderTable(headerLine, sepLine, bodyLines, resolveWikilink) {
  var headers = splitRow(headerLine);
  var aligns = splitRow(sepLine).map(function(c){
    var left = c.charAt(0) === ':'; var right = c.charAt(c.length - 1) === ':';
    if (left && right) return 'center';
    if (right) return 'right';
    if (left) return 'left';
    return '';
  });
  var html = '<table><thead><tr>';
  headers.forEach(function(h, i){
    var a = aligns[i] ? (' style="text-align:' + aligns[i] + '"') : '';
    html += '<th' + a + '>' + inline(h, resolveWikilink) + '</th>';
  });
  html += '</tr></thead><tbody>';
  bodyLines.forEach(function(line){
    var cells = splitRow(line);
    html += '<tr>';
    headers.forEach(function(_, i){
      var a = aligns[i] ? (' style="text-align:' + aligns[i] + '"') : '';
      html += '<td' + a + '>' + inline(cells[i] || '', resolveWikilink) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderMarkdown(body, resolveWikilink) {
  var lines = body.split('\n');
  var html = '';
  var i = 0;
  while (i < lines.length) {
    var line = lines[i];

    if (line.trim() === '') { i++; continue; }

    var m = line.match(/^(#{1,6})\s+(.*)$/);
    if (m) {
      var level = m[1].length;
      html += '<h' + level + '>' + inline(m[2], resolveWikilink) + '</h' + level + '>';
      i++; continue;
    }

    if (line.indexOf('|') !== -1 && i + 1 < lines.length && isTableSep(lines[i + 1])) {
      var header = line;
      var sep = lines[i + 1];
      var bodyRows = [];
      var j = i + 2;
      while (j < lines.length && lines[j].trim() !== '' && lines[j].indexOf('|') !== -1) {
        bodyRows.push(lines[j]);
        j++;
      }
      html += renderTable(header, sep, bodyRows, resolveWikilink);
      i = j; continue;
    }

    if (/^(---+|\*\*\*+|___+)$/.test(line.trim())) {
      html += '<hr>';
      i++; continue;
    }

    if (/^\s*>/.test(line)) {
      var quoteLines = [];
      var jj = i;
      while (jj < lines.length && /^\s*>/.test(lines[jj])) {
        quoteLines.push(lines[jj].replace(/^\s*>\s?/, ''));
        jj++;
      }
      html += '<blockquote><p>' + inline(quoteLines.join(' '), resolveWikilink) + '</p></blockquote>';
      i = jj; continue;
    }

    if (/^\s*([-*]|\d+\.)\s+/.test(line)) {
      var listLines = [];
      var jjj = i;
      while (jjj < lines.length) {
        if (/^\s*([-*]|\d+\.)\s+/.test(lines[jjj])) {
          listLines.push(lines[jjj]);
          jjj++;
        } else if (lines[jjj].trim() === '' && jjj + 1 < lines.length && /^\s*([-*]|\d+\.)\s+/.test(lines[jjj + 1])) {
          jjj++;
        } else {
          break;
        }
      }
      html += renderList(listLines, resolveWikilink);
      i = jjj; continue;
    }

    // paragraph
    var paraLines = [];
    var p = i;
    while (p < lines.length && lines[p].trim() !== ''
      && !/^(#{1,6})\s+/.test(lines[p])
      && !/^\s*([-*]|\d+\.)\s+/.test(lines[p])
      && !/^\s*>/.test(lines[p])
      && !/^(---+|\*\*\*+|___+)$/.test(lines[p].trim())
      && !(lines[p].indexOf('|') !== -1 && p + 1 < lines.length && isTableSep(lines[p + 1]))) {
      paraLines.push(lines[p]);
      p++;
    }
    if (paraLines.length) {
      html += '<p>' + inline(paraLines.join(' '), resolveWikilink) + '</p>';
      i = p;
    } else {
      i++;
    }
  }
  return html;
}

/* ---------------- app ---------------- */

var FILES = Object.keys(DATA).sort();
var GROUP_LABELS = { wiki: 'Wiki', artifacts: 'Artifacts' };
var GROUP_ORDER = ['wiki', 'artifacts'];

var slugIndex = {};
var fileMeta = {}; // path -> {meta, body, title}

FILES.forEach(function(p){
  var parsed = parseFrontmatter(DATA[p]);
  var title = getTitle(p, parsed.meta, parsed.body);
  fileMeta[p] = { meta: parsed.meta, body: parsed.body, title: title };
  var slug = p.split('/').pop().replace(/\.md$/, '').toLowerCase();
  slugIndex[slug] = p;
});

function resolveWikilink(rawSlug) {
  var slug = rawSlug.trim().toLowerCase();
  var p = slugIndex[slug];
  if (!p) return null;
  return { path: p, title: fileMeta[p].title };
}

function groupOf(p) {
  var parts = p.split('/');
  return parts.length === 1 ? '' : parts[0];
}

function buildSidebar() {
  var groups = {};
  GROUP_ORDER.forEach(function(g){ groups[g] = []; });
  FILES.forEach(function(p){
    var g = groupOf(p);
    if (!groups[g]) groups[g] = [];
    groups[g].push(p);
  });

  var html = '';
  GROUP_ORDER.forEach(function(g){
    var items = groups[g];
    if (!items || !items.length) return;
    var label = GROUP_LABELS[g] || g;

    var sorted = items.slice().sort(function(a,b){ return fileMeta[a].title.localeCompare(fileMeta[b].title); });
    if (g === 'wiki') {
      var idx = sorted.indexOf('wiki/index.md');
      if (idx > 0) { sorted.splice(idx, 1); sorted.unshift('wiki/index.md'); }
    }
    html += '<details class="group" open><summary>' + label + '</summary>' + fileListHtml(sorted) + '</details>';
  });

  document.getElementById('sidebar').innerHTML = html;
}

function fileListHtml(paths) {
  var html = '<ul class="filelist">';
  paths.forEach(function(p){
    html += '<li data-title="' + escapeHtml(fileMeta[p].title.toLowerCase()) + '" data-path="' + p + '">'
      + '<a href="#' + encodeURIComponent(p) + '" data-path="' + p + '">' + escapeHtml(fileMeta[p].title) + '</a></li>';
  });
  html += '</ul>';
  return html;
}

function breadcrumbFor(p) {
  var g = groupOf(p);
  var segs = ['<a href="#">Home</a>', GROUP_LABELS[g] || g];
  return segs.join(' <span style="opacity:.4">/</span> ');
}

function metaBoxHtml(meta) {
  var keys = Object.keys(meta).filter(function(k){ return k !== 'title'; });
  if (!keys.length) return '';
  var html = '<div class="meta-box">';
  keys.forEach(function(k){
    var v = meta[k];
    var vHtml;
    if (Array.isArray(v)) {
      vHtml = v.map(function(t){ return '<span class="chip">' + escapeHtml(t) + '</span>'; }).join('');
    } else if (k === 'description') {
      vHtml = '<em>' + escapeHtml(v) + '</em>';
    } else {
      vHtml = escapeHtml(v);
    }
    html += '<div class="meta-row"><span class="k">' + escapeHtml(k) + '</span><span class="v">' + vHtml + '</span></div>';
  });
  html += '</div>';
  return html;
}

function backlinksHtml(p) {
  var slug = p.split('/').pop().replace(/\.md$/, '').toLowerCase();
  var re = new RegExp('\\[\\[\\s*' + slug.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*(\\||\\])', 'i');
  var linkedFrom = FILES.filter(function(other){
    return other !== p && re.test(DATA[other]);
  });
  var html = '<div class="backlinks"><h4>Linked from</h4>';
  if (!linkedFrom.length) {
    html += '<p class="empty">No other notes link here.</p>';
  } else {
    html += '<ul>' + linkedFrom.map(function(other){
      return '<li><a href="#' + encodeURIComponent(other) + '" data-path="' + other + '">' + escapeHtml(fileMeta[other].title) + '</a> <span style="color:var(--text-faint)">(' + other + ')</span></li>';
    }).join('') + '</ul>';
  }
  html += '</div>';
  return html;
}

function renderHome() {
  document.title = 'Notes';
  var groups = {};
  FILES.forEach(function(p){ var g = groupOf(p); groups[g] = (groups[g]||0)+1; });
  var html = '<h1>Notes</h1>';
  html += '<p>A plain-text browser for the curriculum source files in this project. Pick a note from the sidebar, or open a file below. Wikilinks (like <code>[[stakeholder-needs-mapping]]</code>) are clickable and jump straight to the linked note.</p>';
  html += '<div class="home-stats">';
  html += '<div class="stat"><div class="num">' + FILES.length + '</div><div class="lab">Files</div></div>';
  GROUP_ORDER.forEach(function(g){
    if (!groups[g]) return;
    html += '<div class="stat"><div class="num">' + groups[g] + '</div><div class="lab">' + (GROUP_LABELS[g] || g) + '</div></div>';
  });
  html += '</div>';
  html += '<h2>Start here</h2><ul>';
  ['wiki/index.md'].forEach(function(p){
    if (fileMeta[p]) html += '<li><a href="#' + encodeURIComponent(p) + '" data-path="' + p + '">' + escapeHtml(fileMeta[p].title) + '</a></li>';
  });
  html += '</ul>';
  document.getElementById('content').innerHTML = html;
  setActiveSidebarLink(null);
}

var showingSource = {};

function renderFile(p) {
  if (!fileMeta[p]) { renderHome(); return; }
  var fm = fileMeta[p];
  document.title = fm.title + ' · Notes';

  var html = '<div class="breadcrumb">' + breadcrumbFor(p) + '</div>';
  html += metaBoxHtml(fm.meta);
  html += '<button id="source-toggle" data-path="' + p + '">' + (showingSource[p] ? 'Show rendered' : 'Show source') + '</button>';
  html += '<article id="article-body">';
  if (showingSource[p]) {
    html += '<pre class="source">' + escapeHtml(DATA[p]) + '</pre>';
  } else {
    html += renderMarkdown(fm.body, resolveWikilink);
  }
  html += '</article>';
  html += backlinksHtml(p);

  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
  window.scrollTo(0, 0);
  setActiveSidebarLink(p);
}

function setActiveSidebarLink(p) {
  var links = document.querySelectorAll('.filelist a');
  links.forEach(function(a){
    a.classList.toggle('active', a.getAttribute('data-path') === p);
  });
}

function currentPathFromHash() {
  var h = location.hash.replace(/^#/, '');
  if (!h) return null;
  try { return decodeURIComponent(h); } catch (e) { return h; }
}

function route() {
  var p = currentPathFromHash();
  if (p && fileMeta[p]) renderFile(p);
  else renderHome();
}

window.addEventListener('hashchange', route);

document.addEventListener('click', function(e){
  var toggle = e.target.closest('#source-toggle');
  if (toggle) {
    var p = toggle.getAttribute('data-path');
    showingSource[p] = !showingSource[p];
    renderFile(p);
    return;
  }
  var closeSidebarOn = e.target.closest('.filelist a, .wikilink[data-path]');
  if (closeSidebarOn && window.innerWidth <= 780) {
    document.getElementById('sidebar').classList.remove('open');
  }
});

document.getElementById('search').addEventListener('input', function(e){
  var q = e.target.value.trim().toLowerCase();
  var items = document.querySelectorAll('.filelist li');
  items.forEach(function(li){
    var match = !q || li.getAttribute('data-title').indexOf(q) !== -1;
    li.classList.toggle('no-match', !match);
  });
  document.querySelectorAll('details.group, details.subgroup').forEach(function(d){
    var anyVisible = d.querySelectorAll('.filelist li:not(.no-match)').length > 0;
    if (q) d.open = anyVisible;
  });
});

document.getElementById('sidebar-toggle').addEventListener('click', function(){
  document.getElementById('sidebar').classList.toggle('open');
});

document.getElementById('theme-toggle').addEventListener('click', function(){
  var html = document.documentElement;
  var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  if (next === 'dark') html.setAttribute('data-theme', 'dark');
  else html.removeAttribute('data-theme');
  try { localStorage.setItem('notes-theme', next); } catch(e){}
});

try {
  var saved = localStorage.getItem('notes-theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
} catch(e){}

buildSidebar();
route();

})();
</script>
</body>
</html>
